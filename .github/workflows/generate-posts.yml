name: Generate LinkedIn Content

on:
  schedule:
    # Sun/Tue/Thu at 8am Israel time (UTC+3 summer, UTC+2 winter)
    # Using 5am UTC = 8am IDT (summer). Adjust to 6am UTC in winter.
    - cron: '0 5 * * 0,2,4'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate content with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 .github/scripts/generate.py

      - name: Commit and push content.json
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "bot@noreply.github.com"
          git add content.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Content update: $(date '+%d.%m.%Y %H:%M')"
            git push
          fi
